name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format Check
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.31.0
          out=$(goimports -l .)
          if [ -n "$out" ]; then
            echo "::error::Files not formatted (run 'make fmt'):"
            echo "$out"
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11.4"
          only-new-issues: true

      # Advisory only: govulncheck flags both module CVEs and stdlib CVEs in
      # the active Go toolchain. Stdlib findings can only be fixed by bumping
      # Go itself, so blocking PRs on them would create unfixable red CI
      # between Go patch releases. Review the output, bump tooling when
      # warranted.
      - name: Vulnerability Scan
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage Summary
        run: |
          {
            echo "## Coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        uses: fgrosse/go-coverage-report@v1.2.0
        with:
          coverage-artifact-name: coverage
          coverage-file-name: coverage.out
