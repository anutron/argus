name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format Check
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.31.0
          out=$(goimports -l .)
          if [ -n "$out" ]; then
            echo "::error::Files not formatted (run 'make fmt'):"
            echo "$out"
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.11.4"
          only-new-issues: true

      # Advisory only: govulncheck flags both module CVEs and stdlib CVEs in
      # the active Go toolchain. Stdlib findings can only be fixed by bumping
      # Go itself, so blocking PRs on them would create unfixable red CI
      # between Go patch releases. Review the output, bump tooling when
      # warranted.
      - name: Vulnerability Scan
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Filter Coverage
        # Strips entries listed in coverage-ignore.txt (CLI entry points,
        # raw-tty glue, etc.) and writes coverage.filtered.out. Total floor
        # gate is enforced via -min in the next step.
        run: |
          go run ./scripts/coverfilter \
            -in coverage.out \
            -out coverage.filtered.out \
            -quiet > coverage.filtered.pct
          echo "filtered=$(cat coverage.filtered.pct)" >> "$GITHUB_OUTPUT"
        id: cover

      - name: Coverage Summary
        run: |
          {
            echo "## Coverage"
            echo ""
            echo "**Filtered total: ${{ steps.cover.outputs.filtered }}%** (88% floor; ratcheting to 95%)"
            echo ""
            echo '<details><summary>Per-function (filtered)</summary>'
            echo ''
            echo '```'
            go tool cover -func=coverage.filtered.out
            echo '```'
            echo '</details>'
            echo ''
            echo '<details><summary>Per-function (raw, includes excluded files)</summary>'
            echo ''
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.filtered.out | tail -1

      - name: Coverage Gate
        # Hard fail if filtered coverage drops below the floor. The floor
        # ratchets up — it is intentionally set just below the current rolling
        # number so any regression is rejected and the project trends toward
        # the 95% target documented in context/knowledge/testing.md.
        run: |
          go run ./scripts/coverfilter -in coverage.out -min 88 -quiet >/dev/null

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.filtered.out
          retention-days: 7

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: coverage
          coverage-file-name: coverage.out
