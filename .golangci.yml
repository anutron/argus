version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
    - ineffassign
    - unused

  settings:
    errcheck:
      # Don't flag deferred close / flush calls — common Go idiom.
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*os.File).Close
        - (io.Closer).Close
        - (net.Conn).Close
    revive:
      rules:
        - name: exported
          disabled: true # too noisy for a single-user project
    gosec:
      excludes:
        - G104 # unhandled errors — covered by errcheck
        - G304 # file path from variable — expected in CLI tools

  exclusions:
    paths:
      - context
      - screenshots
